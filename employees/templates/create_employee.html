{% extends "Base.html" %}
{% block content %}

<div class="container mt-3 px-5">
    <div class="row">
        <div class="col-md-12">
            <h2 class="mb-4">Add Employee</h2>
            <form method="POST" action="{% url 'create_employee' %}" enctype="multipart/form-data">
                {% csrf_token %}
                <!-- Basic Details -->
                <div>

                    <div>
                        <h4>Basic Details</h4>
                    </div>
                    <div>
                        <input type="file" name="employee_images" accept="image/*" required>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <!-- <div class="mb-3">
                            <input type="text" class="form-control" id="employeeID" name="employeeID"
                                placeholder="Employee ID" required>
                        </div> -->
                        <div class="mb-3">
                            <input type="text" class="form-control" id="fullName" name="name" placeholder="Full Name"
                                required>
                        </div>
                        <div class="mb-3">
                            <input type="email" class="form-control" id="email" name="email" placeholder="Email"
                                required>
                        </div>
                        <div class="mb-3">
                            <input type="password" class="form-control" id="password" name="password"
                                placeholder="Password" required>
                        </div>
                    </div>

                    <div class="col-md-6">

                        <div class="mb-3">
                            <input type="date" class="form-control" id="dob" name="dob" required>
                        </div>
                        <div class="mb-3">
                            <input type="number" class="form-control" id="phone" name="phone" placeholder="Phone Number"
                                pattern="[0-9]{10}" required>
                        </div>
                        <div class="mb-3">
                            <select class="form-select form-control" id="gender" name="gender" required>
                                <option value="">--Gender--</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <select class="form-select form-control" id="marital_status" name="marital_status" required>
                                <option value="">--Marital Status--</option>
                                <option value="Single">Single</option>
                                <option value="Married">Married</option>
                            </select>
                        </div>
                    </div>
                </div>



                <!-- Address Details -->
                <div>
                    <h4>Address</h4>
                </div>
                <div class="row">

                    <div class="col-md-6">
                        <div class="mb-3">
                            <input type="text" class="form-control" id="street" name="street" placeholder="Street"
                                required>
                        </div>
                        <div class="mb-3">
                            <input type="text" class="form-control" id="city" name="city" placeholder="City" required>
                        </div>
                        <div class="mb-3">
                            <input type="text" class="form-control" id="state" name="state" placeholder="State"
                                required>
                        </div>
                        <div class="mb-3">
                            <input type="text" class="form-control" id="postalCode" name="postalCode"
                                placeholder="Postal Code" required>
                        </div>
                        <div class="mb-3">
                            <input type="text" class="form-control" id="country" name="country" placeholder="Country"
                                required>
                        </div>
                    </div>
                </div>
                <!-- Department & Role -->
                <h4>Department & Role</h4>
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <select class="form-select form-control" id="department" name="department" required>
                                {% for department in departments %}
                                <option value="{{ department.id }}">{{ department.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <select class="form-select form-control" id="shift" name="shift" required>
                                <option value="">--Shift--</option>
                                <option value="Morning">Morning</option>
                                <option value="Evening">Evening</option>
                                <option value="Night">Night</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <select class="form-select form-control" id="employmentType" name="employmentType" required>
                                <option value="">--Employment Type--</option>
                                <option value="Full-time">Full-time</option>
                                <option value="Part-time">Part-time</option>
                            </select>
                        </div>
                        <div class="mb-3 d-flex align-items-center">
                            <label for="" class="me-3">Active</label>
                            <label class="toggle-switch">
                                <input type="checkbox" id="active_status" name="active_status" value="True">
                                <span class="slider"></span>
                            </label>





                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">

                            <input type="number" name="salary" id="salary" required>
                        </div>
                        <div class="mb-3">
                            <select class="form-select form-control" id="designation" name="designation" required>
                                {% for designation in designations %}
                                <option value="{{ designation.id }}">{{ designation.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <input type="date" class="form-control" id="joining_date" name="joining_date"
                                placeholder="Joining Date" step="0.01" required>
                        </div>
                    </div>
                </div>

                <!-- Bank & Emergency Contact Details -->
                <h4>Bank Details</h4>
                <div class="mb-3">
                    <input type="text" class="form-control" id="bankAccount" name="bankAccount"
                        placeholder="Bank Account No" required>
                </div>
                <div class="mb-3">
                    <input type="text" class="form-control" id="bankName" name="bankName" placeholder="Bank Name"
                        required>
                </div>

                <h4>Emergency Contact</h4>
                <div class="mb-3">
                    <input type="text" class="form-control" id="emergencyContactName" name="emergencyContactName"
                        placeholder="Emergency Contact Name" required>
                </div>
                <div class="mb-3">
                    <input type="text" class="form-control" id="emergencyContactrelationship"
                        name="emergencyContactrelationship" placeholder="Relationship" required>
                </div>
                <div class="mb-3">
                    <input type="number" class="form-control" id="emergencyContactPhone" name="emergencyContactPhone"
                        placeholder="Phone Number" required>
                </div>

                <button type="submit" class="btn btn-primary">Add Employee</button>
            </form>
        </div>
    </div>
</div>

<script src="/static/js/jquery-3.3.1.min.js"></script>
<script src="/static/js/bootstrap.min.js"></script>
<script src="/static/js/custom.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
<!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
  -->

    integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
    crossorigin="anonymous"></script> -->

</body>

</html>
{% endblock %}
