{% extends "Base.html" %}
{% block content %}
<div class="container text-center">

    <h2>Add Designation</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit btn btn-success">Add Designation</button>
    </form>
    
    <h3>Existing Designations</h3>
    <ul>
        {% for desg in designations %}
        <li>{{ desg.name }}</li>
        {% endfor %}
    </ul>
    
</div>

<script src="/static/js/jquery-3.3.1.min.js"></script>
<script src="/static/js/bootstrap.min.js"></script>
